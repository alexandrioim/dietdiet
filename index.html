<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Calculadora IMC y meta</title>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--accent:#2b6cb0;--muted:#6b7280}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;margin:0;background:var(--bg);color:#111}
    .container{max-width:760px;margin:36px auto;padding:20px}
    .card{background:var(--card);border-radius:10px;box-shadow:0 6px 18px rgba(17,24,39,0.08);padding:24px}
    h1{margin:0 0 8px;font-size:20px}
    p.lead{margin:0 0 18px;color:var(--muted)}
    .row{display:flex;flex-wrap:wrap;gap:12px}
    label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
    input,select{width:100%;padding:10px;border:1px solid #e6e9ef;border-radius:8px;font-size:15px}
    .col{flex:1 1 200px;min-width:160px}
    .actions{display:flex;gap:10px;margin-top:14px}
    button{background:var(--accent);color:#fff;padding:10px 14px;border:none;border-radius:8px;cursor:pointer}
    button.secondary{background:#eef2ff;color:var(--accent);border:1px solid rgba(43,108,176,0.12)}
    .result{margin-top:18px;padding:14px;border-radius:8px;background:#f8fafc;border:1px solid #eef2ff}
    .muted{color:var(--muted);font-size:14px}
    footer{margin-top:18px;font-size:13px;color:var(--muted)}
    @media(max-width:520px){.row{flex-direction:column}}
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Calculadora IMC y metas</h1>
      <p class="lead">Ingresa datos básicos y obtén tu IMC y recomendaciones iniciales según tu objetivo.</p>

      <form id="form">
        <div class="row">
          <div class="col">
            <label for="name">Nombre</label>
            <input id="name" type="text" placeholder="Tu nombre" required />
          </div>

          <div class="col">
            <label for="diet">Tipo de dieta</label>
            <select id="diet" required>
              <option value="omnivora">Omnívora</option>
              <option value="vegetariana">Vegetariana</option>
              <option value="vegana">Vegana</option>
              <option value="carnivora">Carnívora</option>
              <option value="flexitariana">Flexitariana</option>
              <option value="sin_dieta">Sin preferencia</option>
            </select>
          </div>
        </div>

        <div class="row" style="margin-top:12px">
          <div class="col">
            <label for="weight">Peso (kg)</label>
            <input id="weight" type="number" step="0.1" min="20" placeholder="ej. 72.5" required />
          </div>

          <div class="col">
            <label for="height">Altura (cm)</label>
            <input id="height" type="number" step="0.1" min="80" placeholder="ej. 175" required />
          </div>

          <div class="col">
            <label for="goal">¿Qué buscas?</label>
            <select id="goal" required>
              <option value="mantener">Mantener peso</option>
              <option value="bajar">Bajar de peso</option>
              <option value="subir">Subir de peso</option>
              <option value="musculo">Ganar músculo</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button type="submit">Calcular</button>
          <button type="button" class="secondary" id="clear">Borrar</button>
        </div>
      </form>

      <div id="result" class="result" style="display:none"></div>
      <footer>
        Nota: Esta herramienta da recomendaciones iniciales. Para planes personalizados o condiciones médicas, consulta a un profesional.
      </footer>
    </div>
  </div>

  <script>
    const form = document.getElementById('form');
    const resultEl = document.getElementById('result');
    const clearBtn = document.getElementById('clear');

    function bmiCategory(imc) {
      if (imc < 18.5) return 'Bajo peso';
      if (imc < 25) return 'Normal';
      if (imc < 30) return 'Sobrepeso';
      return 'Obesidad';
    }

    function suggestions(goal, weightKg) {
      if (goal === 'mantener') {
        return {
          text: 'Mantener peso: sigue una dieta equilibrada y monitoriza tu peso semanalmente.',
          kcal: '≈ Mantener calorías actuales'
        };
      }
      if (goal === 'bajar') {
        return {
          text: 'Bajar de peso: déficit calórico moderado (ej. -15% a -20%). Mantén proteína adecuada y actividad física.',
          kcal: '-15% a -20% calorías de mantenimiento'
        };
      }
      if (goal === 'subir') {
        return {
          text: 'Subir de peso: superávit calórico leve (ej. +10% a +20%). Aumenta proteínas y entrenamiento de fuerza.',
          kcal: '+10% a +20% calorías de mantenimiento'
        };
      }
      if (goal === 'musculo') {
        const proteinLow = (1.6 * weightKg).toFixed(0);
        const proteinHigh = (2.2 * weightKg).toFixed(0);
        return {
          text: `Ganar músculo: ligero superávit (+200-350 kcal), prioriza entrenamiento de fuerza. Proteína recomendada: ${proteinLow}-${proteinHigh} g/día.`,
          kcal: '+200 a +350 kcal respecto a mantenimiento'
        };
      }
      return { text: '', kcal: '' };
    }

    function saveLocal(data) {
      try {
        localStorage.setItem('user_profile', JSON.stringify(data));
      } catch(e){}
    }

    function loadLocal() {
      try {
        const raw = localStorage.getItem('user_profile');
        if (!raw) return null;
        return JSON.parse(raw);
      } catch(e){ return null; }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const diet = document.getElementById('diet').value;
      const weight = parseFloat(document.getElementById('weight').value);
      const heightCm = parseFloat(document.getElementById('height').value);
      const goal = document.getElementById('goal').value;

      if (!name || !weight || !heightCm) {
        alert('Completa todos los campos.');
        return;
      }

      const heightM = heightCm / 100;
      const imc = weight / (heightM * heightM);
      const imcRounded = Math.round(imc * 10) / 10;
      const category = bmiCategory(imc);
      const rec = suggestions(goal, weight);

      const now = new Date().toLocaleString();
      const html = `
        <strong>Hola ${escapeHtml(name)}</strong> — ${now}<br/>
        <div class="muted">Tipo de dieta: ${escapeHtml(diet)}</div>
        <hr/>
        <div><strong>IMC:</strong> ${imcRounded} — <em>${category}</em></div>
        <div class="muted">Peso: ${weight} kg · Altura: ${heightCm} cm</div>
        <hr/>
        <div><strong>Objetivo:</strong> ${goalText(goal)}</div>
        <div style="margin-top:8px">${rec.text}</div>
        <div class="muted" style="margin-top:6px">Guía calórica: ${rec.kcal}</div>
      `;
      resultEl.innerHTML = html;
      resultEl.style.display = 'block';

      saveLocal({ name, diet, weight, heightCm, goal, imc: imcRounded, updated: now });
    });

    clearBtn.addEventListener('click', () => {
      if (confirm('Borrar datos guardados y limpiar el formulario?')) {
        form.reset();
        resultEl.style.display = 'none';
        localStorage.removeItem('user_profile');
      }
    });

    window.addEventListener('load', () => {
      const saved = loadLocal();
      if (saved) {
        document.getElementById('name').value = saved.name || '';
        document.getElementById('diet').value = saved.diet || 'omnivora';
        document.getElementById('weight').value = saved.weight || '';
        document.getElementById('height').value = saved.heightCm || '';
        document.getElementById('goal').value = saved.goal || 'mantener';
      }
    });

    function goalText(g){ if(g==='mantener') return 'Mantener peso'; if(g==='bajar') return 'Bajar de peso'; if(g==='subir') return 'Subir de peso'; if(g==='musculo') return 'Ganar músculo'; return g }
    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, function(m){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]) }) }
  </script>
</body>
</html>
